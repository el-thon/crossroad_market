name: Marker-only Store Navigation Migration

on:
  pull_request:
    branches:
      - main
    paths:
      - "scripts/**"
      - "scenes/**"
      - "data/**"
      - "tools/ci/migrate_store_marker_only.py"
      - ".github/workflows/store-navigation-parse.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  migrate-and-compile:
    if: github.head_ref == 'agent/rebuild-store-marker-only-routing'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout migration branch
        uses: actions/checkout@v4
        with:
          ref: agent/rebuild-store-marker-only-routing
          fetch-depth: 0

      - name: Apply deterministic migration
        run: python tools/ci/migrate_store_marker_only.py

      - name: Install Godot 4.7 stable
        shell: bash
        run: |
          curl --fail --location --retry 3 \
            --output /tmp/godot.zip \
            https://github.com/godotengine/godot/releases/download/4.7-stable/Godot_v4.7-stable_linux.x86_64.zip
          unzip -q /tmp/godot.zip -d /tmp/godot
          chmod +x /tmp/godot/Godot_v4.7-stable_linux.x86_64

      - name: Compile every GDScript resource
        shell: bash
        run: |
          cat > /tmp/check_all_scripts.gd <<'GDSCRIPT'
          extends SceneTree

          var failures: int = 0

          func _init() -> void:
              _scan_directory("res://")
              if failures > 0:
                  push_error("Failed to compile %d GDScript resource(s)." % failures)
              quit(1 if failures > 0 else 0)

          func _scan_directory(path: String) -> void:
              var directory: DirAccess = DirAccess.open(path)
              if directory == null:
                  push_error("Cannot open %s" % path)
                  failures += 1
                  return
              directory.list_dir_begin()
              var entry: String = directory.get_next()
              while entry != "":
                  if entry == ".godot" or entry == ".git":
                      entry = directory.get_next()
                      continue
                  var full_path: String = path.path_join(entry)
                  if directory.current_is_dir():
                      _scan_directory(full_path)
                  elif entry.ends_with(".gd"):
                      var script: Resource = ResourceLoader.load(
                          full_path,
                          "Script",
                          ResourceLoader.CACHE_MODE_IGNORE
                      )
                      if script == null:
                          failures += 1
                  entry = directory.get_next()
              directory.list_dir_end()
          GDSCRIPT
          set +e
          timeout 180s /tmp/godot/Godot_v4.7-stable_linux.x86_64 \
            --headless --path . --script /tmp/check_all_scripts.gd \
            > /tmp/compile.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            tail -n 160 /tmp/compile.log
            exit "$status"
          fi
          echo "Godot 4.7 loaded every GDScript resource successfully."

      - name: Verify project boots headlessly
        id: boot
        continue-on-error: true
        shell: bash
        run: |
          set +e
          timeout 60s /tmp/godot/Godot_v4.7-stable_linux.x86_64 \
            --headless --path . --quit \
            > /tmp/boot.log 2>&1
          status=$?
          echo "$status" > /tmp/boot-status.txt
          tail -n 80 /tmp/boot.log
          exit "$status"

      - name: Upload boot diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: marker-only-boot-diagnostics
          path: |
            /tmp/boot.log
            /tmp/boot-status.txt
          if-no-files-found: error
          retention-days: 3

      - name: Enforce boot result
        shell: bash
        run: |
          status=$(cat /tmp/boot-status.txt)
          if [ "$status" -ne 0 ]; then
            echo "Headless boot failed with status $status"
            exit "$status"
          fi

      - name: Commit verified migration
        shell: bash
        run: |
          git restore .github/workflows/store-navigation-parse.yml
          rm -f tools/ci/migrate_store_marker_only.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A scripts scenes data tools/ci
          git commit -m "Rebuild Store NPC pathing with marker-only routes"
          git push origin HEAD:agent/rebuild-store-marker-only-routing
